name: Build
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
env:
  GIT_USER: github-actions[bot]
  GIT_EMAIL: github-actions[bot]@users.noreply.github.com
jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Tune Git
        run: |
          git config --global core.longpaths true
          git config --global core.preloadindex true
          git config --global core.fscache true
          git config --global gc.auto 0
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false
          fetch-depth: 1
      - name: Set Up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false
      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Clone for Ruleset
        run: |
          rm -rf Ruleset
          git clone --depth=1 --single-branch https://github.com/SukkaW/Surge.git Ruleset
      - name: Install Dependencies for Ruleset
        working-directory: Ruleset
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Prepare Output Directories
        run: |
          mkdir -p ${{ github.workspace }}/build/List/domainset
          mkdir -p ${{ github.workspace }}/build/Clash/non_ip
          mkdir -p ${{ github.workspace }}/build/Filters
          touch ${{ github.workspace }}/build/List/domainset/speedtest.conf
          touch ${{ github.workspace }}/build/Clash/non_ip/stream.txt
      - name: Build for Ruleset
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bash -euo pipefail -c "cd Ruleset && pnpm run build"
        env:
          PUBLIC_DIR: ${{ github.workspace }}/build
          NODE_ENV: production
      - name: Validate for Ruleset
        run: |
          [ -d build ]
          [ "$(find build -type f | wc -l)" -gt 0 ]
          [ -f Ruleset/.BUILD_FINISHED ]
      - name: Patches for Ruleset
        run: |
          echo "updates.alma.now" >> build/List/domainset/download.conf
          echo "PROCESS-NAME,NeatDownloadManager" >> build/List/non_ip/download.conf
      - name: Clone for Filters
        run: |
          rm -rf Filters
          git clone --depth=1 --single-branch https://github.com/SukkaW/Filters.git Filters
      - name: Install Dependencies for Filters
        working-directory: Filters
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build for Filters
        uses: nick-fields/retry@v3.0.2
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bash -euo pipefail -c "cd Filters && pnpm run build && pnpm run build-3p-filters"
        env:
          NODE_ENV: production
      - name: Stage for Filters
        run: cp -r Filters/public/* ./build/Filters/
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build
          retention-days: 1
  compile:
    name: Build Target for ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        target: [sing-box, mihomo]
    steps:
      - name: Checkout Repository for ${{ matrix.target }}
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false
          fetch-depth: 1
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build
      - name: Configure Git Identity for Commits
        run: |
          git config user.name "${{ env.GIT_USER }}"
          git config user.email "${{ env.GIT_EMAIL }}"
      - name: Set Up Python for ${{ matrix.target }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Set Up Go for ${{ matrix.target }}
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25
      - name: Install Dependencies for ${{ matrix.target }}
        run: |
          python -Im pip install --upgrade pip
          python -Im pip install --requirement requirements.txt
      - name: Resolve Version for sing-box
        id: version
        run: |
          version=$(curl -sL https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '.[0].tag_name[1:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build srsc for ${{ matrix.target }}
        run: |
          git submodule add https://github.com/iantsysog/sing-rule.git srsc 2>/dev/null || true
          git submodule update --init --recursive srsc
          cd srsc
          go clean -modcache
          go get github.com/sagernet/sing-box@v${{ steps.version.outputs.version }}
          go mod tidy
          go build -o srsc ./cmd/srsc
      - name: Generate Base Outputs for ${{ matrix.target }}
        run: |
          ln -sfn "$PWD/build/List" "$PWD/List"
          mkdir -p "$PWD/Modules/Rules"
          ln -sfn "$PWD/build/Modules/Rules/sukka_local_dns_mapping" "$PWD/Modules/Rules/sukka_local_dns_mapping"
          python main.py
      - name: Generate Go Outputs for sing-box
        if: matrix.target == 'sing-box'
        run: go run main.go
      - name: Install Binary for sing-box
        if: matrix.target == 'sing-box'
        run: |
          workdir=$(mktemp -d)
          trap 'rm -rf "$workdir"' EXIT
          archive="sing-box-${{ steps.version.outputs.version }}-linux-amd64.tar.gz"
          uri="https://github.com/SagerNet/sing-box/releases/download/v${{ steps.version.outputs.version }}/${archive}"
          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors -o "$workdir/pkg.tgz" "$uri"
          tar -xzf "$workdir/pkg.tgz" -C "$workdir"
          sudo install -m 0755 "$workdir/sing-box-${{ steps.version.outputs.version }}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version
      - name: Install Binary for mihomo
        if: matrix.target == 'mihomo'
        env:
          MIHOMO_VERSION: Prerelease-Alpha
        run: |
          workdir=$(mktemp -d)
          trap 'rm -rf "$workdir"' EXIT
          PACKAGE_NAME=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/$MIHOMO_VERSION" | \
            jq -r '.assets[] | select(.name | startswith("mihomo-linux-amd64-alpha-") and endswith(".gz")) | .name')
          uri="https://github.com/MetaCubeX/mihomo/releases/download/$MIHOMO_VERSION/$PACKAGE_NAME"
          curl --fail --location --retry 5 --retry-delay 5 --retry-all-errors -o "$workdir/pkg.gz" "$uri"
          gzip -d "$workdir/pkg.gz"
          chmod +x "$workdir/pkg"
          sudo install -m 0755 "$workdir/pkg" /usr/local/bin/mihomo
          mihomo -v
      - name: Compile Build for sing-box
        if: matrix.target == 'sing-box'
        run: |
          cd sing-box
          shopt -s nullglob
          for category in domainset ip non_ip dns; do
            json_path="json/$category"
            srs_path="srs/$category"
            [ -d "$json_path" ] || continue
            mkdir -p "$srs_path"
            while IFS= read -r -d '' src; do
              base=$(basename "${src%.json}")
              sing-box rule-set compile --output "$srs_path/${base}.srs" "$src"
            done < <(find "$json_path" -type f -name '*.json' -print0)
          done
      - name: Compile AdGuard for sing-box
        if: matrix.target == 'sing-box'
        run: |
          mkdir -p sing-box/srs/adguard
          adguard_files=(
            "build/Internal/reject-adguardhome.txt:reject.adguard"
            "build/Internal/my-reject-adguardhome.txt:my-reject.adguard"
            "build/Filters/filters/sukka-adguard-missing.txt:adguard-missing.adguard"
            "build/Filters/filters/sukka-collections-combined.txt:filter.adguard"
            "build/Filters/filters/sukka-ubo-missing.txt:ubo-missing.adguard"
            "build/Filters/filters/index.txt:index.adguard"
          )
          for entry in "${adguard_files[@]}"; do
            filter_file="${entry%:*}"
            output_name="${entry#*:}"
            output_file="sing-box/srs/adguard/${output_name}.srs"
            [[ -f "$filter_file" ]]
            sing-box rule-set convert --type adguard --output "$output_file" "$filter_file"
            [[ -f "$output_file" && -s "$output_file" ]]
          done
      - name: Start srsc API for sing-box
        if: matrix.target == 'sing-box'
        run: |
          ./srsc/srsc run -c srsc.json &
          sleep 5
          curl -s http://127.0.0.1:8080/sing-box/ip/cdn/source
      - name: Start srsc API for mihomo
        if: matrix.target == 'mihomo'
        run: |
          ./srsc/srsc run -c srsc.json &
          sleep 5
          curl -s http://127.0.0.1:8080/mihomo/ip/cdn/text
      - name: Export for sing-box
        if: matrix.target == 'sing-box'
        run: |
          mkdir -p sing-box/srsc/{source,binary}/{domainset,ip,non_ip,dns}
          for category in domainset non_ip; do
            for file in build/List/$category/*.conf; do
              [ -f "$file" ] || continue
              name=$(basename "$file" .conf | sed 's/_/-/g')
              api_name=$(basename "$file" .conf)
              curl -s -H "User-Agent: sing-box ${{ steps.version.outputs.version }}" "http://127.0.0.1:8080/sing-box/$category/$api_name/source" > "sing-box/srsc/source/$category/$name.$category.json"
              curl -s -H "User-Agent: sing-box ${{ steps.version.outputs.version }}" "http://127.0.0.1:8080/sing-box/$category/$api_name/binary" > "sing-box/srsc/binary/$category/$name.$category.srs"
            done
          done
          for file in build/List/ip/*.conf; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .conf | sed 's/_/-/g')
            api_name=$(basename "$file" .conf)
            curl -s -H "User-Agent: sing-box ${{ steps.version.outputs.version }}" "http://127.0.0.1:8080/sing-box/ip/$api_name/source" > "sing-box/srsc/source/ip/$name.ip.json"
            curl -s -H "User-Agent: sing-box ${{ steps.version.outputs.version }}" "http://127.0.0.1:8080/sing-box/ip/$api_name/binary" > "sing-box/srsc/binary/ip/$name.ip.srs"
          done
          for file in build/Modules/Rules/sukka_local_dns_mapping/*.conf; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .conf | sed 's/_/-/g')
            api_name=$(basename "$file" .conf)
            curl -s -H "User-Agent: sing-box ${{ steps.version.outputs.version }}" "http://127.0.0.1:8080/sing-box/dns/$api_name/source" > "sing-box/srsc/source/dns/$name.dns.json"
            curl -s -H "User-Agent: sing-box ${{ steps.version.outputs.version }}" "http://127.0.0.1:8080/sing-box/dns/$api_name/binary" > "sing-box/srsc/binary/dns/$name.dns.srs"
          done
      - name: Export for mihomo
        if: matrix.target == 'mihomo'
        run: |
          mkdir -p mihomo/srsc/text/{domainset,ip,non_ip,dns}
          mkdir -p mihomo/srsc/mrs/{domain,ipcidr}
          for category in domainset; do
            for file in build/List/$category/*.conf; do
              [ -f "$file" ] || continue
              name=$(basename "$file" .conf | sed 's/_/-/g')
              api_name=$(basename "$file" .conf)
              curl -s "http://127.0.0.1:8080/mihomo/$category/$api_name/text" > "mihomo/srsc/text/$category/$name.$category.txt"
              curl -s "http://127.0.0.1:8080/mihomo/$category/$api_name/mrs" > "mihomo/srsc/mrs/domain/$name.$category.mrs"
            done
          done
          for file in build/List/ip/*.conf; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .conf | sed 's/_/-/g')
            api_name=$(basename "$file" .conf)
            curl -s "http://127.0.0.1:8080/mihomo/ip/$api_name/text" > "mihomo/srsc/text/ip/$name.ip.txt"
          done
          for file in build/List/ip/china_ip.conf build/List/ip/china_ip_ipv6.conf; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .conf | sed 's/_/-/g')
            api_name=$(basename "$file" .conf)
            curl -s "http://127.0.0.1:8080/mihomo/ip/$api_name/mrs" > "mihomo/srsc/mrs/ipcidr/$name.ipcidr.mrs"
          done
          for category in non_ip; do
            for file in build/List/$category/*.conf; do
              [ -f "$file" ] || continue
              name=$(basename "$file" .conf | sed 's/_/-/g')
              api_name=$(basename "$file" .conf)
              curl -s "http://127.0.0.1:8080/mihomo/$category/$api_name/text" > "mihomo/srsc/text/$category/$name.$category.txt"
            done
          done
          for file in build/Modules/Rules/sukka_local_dns_mapping/*.conf; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .conf | sed 's/_/-/g')
            api_name=$(basename "$file" .conf)
            curl -s "http://127.0.0.1:8080/mihomo/dns/$api_name/text" > "mihomo/srsc/text/dns/$name.dns.txt"
          done
      - name: Stop srsc API for ${{ matrix.target }}
        run: pkill -f "srsc run" || true
      - name: Compile Build for mihomo
        if: matrix.target == 'mihomo'
        run: |
          cd mihomo
          shopt -s nullglob
          text_ip_path="text/ip"
          mrs_ip_path="mrs/ipcidr"
          if [ -d "$text_ip_path" ]; then
            mkdir -p "$mrs_ip_path"
            while IFS= read -r -d '' src; do
              base=$(basename "${src%.ip.txt}")
              mihomo convert-ruleset ipcidr text "$src" "$mrs_ip_path/${base}.ipcidr.mrs" || continue
            done < <(find "$text_ip_path" -name 'china-ip*.ip.txt' -type f -print0)
          fi
          text_domainset_path="text/domainset"
          mrs_domain_path="mrs/domain"
          if [ -d "$text_domainset_path" ]; then
            mkdir -p "$mrs_domain_path"
            while IFS= read -r -d '' src; do
              base=$(basename "${src%.txt}")
              mihomo convert-ruleset domain text "$src" "$mrs_domain_path/${base}.domain.mrs" || continue
            done < <(find "$text_domainset_path" -name '*.txt' -type f -print0)
          fi
      - name: Upload Artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}
          retention-days: 1
  push:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure Git Identity for Commits
        run: |
          git config user.name "${{ env.GIT_USER }}"
          git config user.email "${{ env.GIT_EMAIL }}"
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: artifacts/build
      - name: Download sing-box Artifact
        uses: actions/download-artifact@v8
        with:
          name: sing-box
          path: artifacts/sing-box
      - name: Download mihomo Artifact
        uses: actions/download-artifact@v8
        with:
          name: mihomo
          path: artifacts/mihomo
      - name: Push
        run: |
          set -euo pipefail
          resolve_source_dir() {
            local path="$1"
            local nested="$2"
            if [ -d "$path/$nested" ]; then
              echo "$path/$nested"
            else
              echo "$path"
            fi
          }
          reconcile_branch() {
            local branch="$1"
            local source_dir="$2"
            local message="$3"
            local wt
            wt="$(mktemp -d)"
            git fetch origin "$branch"
            git worktree add "$wt" "origin/$branch"
            git -C "$wt" switch -c "$branch" --track "origin/$branch" || git -C "$wt" switch "$branch"
            git -C "$wt" rm -r --ignore-unmatch . || true
            find "$wt" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cp -a "$source_dir"/. "$wt"/
            git -C "$wt" add -A
            if git -C "$wt" diff --cached --quiet; then
              echo "No changes for $branch"
            else
              git -C "$wt" commit -m "$message"
              git -C "$wt" push origin "$branch"
            fi
            git worktree remove "$wt" --force
          }
          sing_box_src="$(resolve_source_dir artifacts/sing-box sing-box)"
          mihomo_src="$(resolve_source_dir artifacts/mihomo mihomo)"
          sukka_src="$(mktemp -d)"
          build_src="$(resolve_source_dir artifacts/build build)"
          cp -a "$build_src"/. "$sukka_src"/
          reconcile_branch "sing-box" "$sing_box_src" "feat(sing-box): bump [$(date -u +%FT%TZ)]"
          reconcile_branch "mihomo" "$mihomo_src" "feat(mihomo): bump [$(date -u +%FT%TZ)]"
          reconcile_branch "Sukka" "$sukka_src" "feat(sukka): bump [$(date -u +%FT%TZ)]"
          rm -rf "$sukka_src"
